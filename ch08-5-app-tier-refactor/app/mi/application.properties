# Spring Boot / Spring Data JPA configuration -- TARGET (Azure SQL MI / DB).
# Diff lines from ../oracle/application.properties are marked CHANGED.

# --- Datasource ---
# CHANGED: driver class.
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# CHANGED: JDBC URL form. encrypt=true is MANDATORY on Azure SQL endpoints.
spring.datasource.url=jdbc:sqlserver://oramigsqlsrvXXX.database.windows.net:1433;database=labdb;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30
spring.datasource.username=${SQL_USER}
spring.datasource.password=${SQL_PASSWORD}

# --- Hibernate / JPA ---
# CHANGED: dialect. Set explicitly; do NOT rely on autodetect (P16 in chapter).
#          Use SQLServer2019Dialect for both Azure SQL DB and SQL MI.
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2019Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# CHANGED: Azure SQL DB / MI deliberately rejects setting transaction isolation
#          via JDBC in some pool states; we let the driver default.

# --- HikariCP pool ---
# CHANGED: Azure SQL DB connection caps depend on the service tier.
#          S1: ~30 concurrent sessions. Pool size MUST be below the cap.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.connection-timeout=30000

# --- Resilience ---
# CHANGED: application-layer retry replaces Oracle RAC TAF. The decorator
#          lives in retry/AzureSqlRetry.java and runs on every JDBC call.
