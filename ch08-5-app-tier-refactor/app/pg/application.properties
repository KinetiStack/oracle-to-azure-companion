# Spring Boot / Spring Data JPA configuration -- TARGET (Azure DB for PG Flex).
# Diff lines from ../oracle/application.properties are marked CHANGED.

# --- Datasource ---
# CHANGED: driver class.
spring.datasource.driver-class-name=org.postgresql.Driver
# CHANGED: JDBC URL form. sslmode=require is MANDATORY (Azure PG rejects
#          non-SSL connections).
spring.datasource.url=jdbc:postgresql://oramigpgXXX.postgres.database.azure.com:5432/labdb?sslmode=require&sslrootcert=/etc/ssl/certs/DigiCertGlobalRootCA.crt.pem&connectTimeout=30
spring.datasource.username=${PG_USER}
spring.datasource.password=${PG_PASSWORD}

# --- Hibernate / JPA ---
# CHANGED: dialect. Set explicitly; do NOT rely on autodetect (P16 in chapter).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- HikariCP pool ---
# CHANGED: PG Flex Burstable B1ms caps at ~50 connections; Memory-Optimized
#          tiers go higher. Pool size MUST be below cap minus what other
#          workloads on the same instance consume.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.connection-timeout=30000

# --- Resilience ---
# CHANGED: application-layer retry replaces Oracle RAC TAF. See retry/pg_retry.py
#          for the Python decorator; resilience4j equivalent for Java apps.
