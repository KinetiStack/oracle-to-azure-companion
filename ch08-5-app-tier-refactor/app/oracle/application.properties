# Spring Boot / Spring Data JPA configuration -- SOURCE (Oracle).
# Compare against ../mi/application.properties and ../pg/application.properties.

# --- Datasource ---
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@//prod-rac-scan:1521/ORA19CPROD
spring.datasource.username=${HRPRO_USER}
spring.datasource.password=${HRPRO_PWD}

# --- Hibernate / JPA ---
spring.jpa.database-platform=org.hibernate.dialect.Oracle19cDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- HikariCP pool ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.connection-timeout=30000

# --- Oracle TAF: failover is handled INSIDE the JDBC driver. Application
#                code does not implement retry. This stops working on Azure;
#                see ../retry/ for the replacement.
