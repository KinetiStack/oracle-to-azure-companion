#-------------------------------------------------------------------------------
# Ora2Pg configuration for the HR-Pro lab.
#
# Source : Oracle 19c container (Ch.3.5), schema HRPRO
# Target : Azure Database for PostgreSQL Flexible Server (PG 16), labdb
#
# Tested with Ora2Pg 24.x. Full reference: https://ora2pg.darold.net/documentation.html
# The book ships only the keys this lab uses. Production migrations will set
# 30-50 keys; the comments below indicate which are most commonly tuned next.
#-------------------------------------------------------------------------------

# -------- Oracle source connection -------------------------------------------
ORACLE_DSN          dbi:Oracle:host=localhost;service_name=ORCLPDB1;port=1521
ORACLE_USER         hrpro
ORACLE_PWD          hrpro_lab_password
ORACLE_HOME         /opt/oracle/instantclient_19_22

# -------- Schema selection ---------------------------------------------------
SCHEMA              HRPRO
EXPORT_SCHEMA       1            # emit the CREATE SCHEMA statement
CREATE_SCHEMA       1            # apply it to the target
USE_RESERVED_WORDS  1            # quote identifiers that collide with PG reserved words

# -------- What to export -----------------------------------------------------
# Run separate passes for each TYPE; the wrapper script invokes ora2pg with
# `-t TYPE -o output_file` for each pass, so the TYPE and OUTPUT directives
# below are NOT used at runtime -- the CLI args override them. We document
# the intended types here for human reference only:
#
#   TYPE values used in this lab: TYPE (UDT), TABLE, INDEXES, SEQUENCE,
#   PACKAGE, TRIGGER, MVIEW, GRANT, FDW (skipped — no DB links in lab).
#
# OUTPUT_DIR is honored by the file-mode emitter when -o is a relative path.
OUTPUT_DIR          ./converted/ora2pg

# -------- Type mapping -------------------------------------------------------
# The default mapping is sensible; we override the cases the book discusses
# in Ch.4 § 4.4 (HR-Pro's UDT, XMLType, NUMBER scale).
#
# Format: ORA_TYPE:pg_type[,ORA_TYPE:pg_type]...
DATA_TYPE           NUMBER:numeric,VARCHAR2:varchar,DATE:timestamp,TIMESTAMP:timestamp,CLOB:text,BLOB:bytea,RAW:bytea,XMLTYPE:xml,LONG:text,LONG RAW:bytea

# Per-column overrides.
#
# We intentionally do NOT override EMPLOYEE.HOME_ADDRESS here -- Ora2Pg's
# default is to emit a PG composite type matching the source UDT shape
# (address_t -> hrpro.address_t composite with the same fields). This is
# the path that keeps Ch.7 GoldenGate Replicat clean: the apply target
# sees the same column structure as the source, so COLMAP USEDEFAULTS
# works end-to-end without a custom UDT-to-JSONB transform.
#
# To switch to JSONB instead (Option 3 in Ch.4 prose), uncomment:
# MODIFY_TYPE        EMPLOYEE:HOME_ADDRESS:JSONB
# but note that GoldenGate Replicat will then require a source-side
# view that serializes the UDT to JSON; see Ch.7 prose § 7.4.

# Cast Oracle NUMBER without scale to integer when precision allows.
NUMBER_TO_NUMBER    1
DEFAULT_NUMERIC     numeric

# -------- PL/SQL handling (deferred to Ch.5) ---------------------------------
# Ch.4 emits a *first-draft* package conversion for context. Ch.5 owns the
# real refactor work. Setting PLSQL_PGSQL=1 turns on Ora2Pg's procedural
# translator; expect comments and warnings in the output where translation
# is ambiguous (autonomous transactions, dynamic SQL, UTL_FILE).
PLSQL_PGSQL         1
NULL_EQUAL_EMPTY    1

# -------- Partitioning -------------------------------------------------------
# Oracle range partitioning -> PG native PARTITION BY RANGE (PG 11+).
# Without this flag Ora2Pg emits partition DDL as comments.
PARTITION_BY_HASH   0
KEEP_PKEY_NAMES     1

# -------- Performance knobs (lab settings — production tunes higher) ---------
PARALLEL_TABLES     1            # 1 keeps output ordering deterministic for diff
DATA_LIMIT          10000        # rows per fetch when used with TYPE=COPY/INSERT
                                 # (data load is Ch.6/Ch.7; not used here)

# -------- Reports ------------------------------------------------------------
# Ora2Pg can emit an HTML migration assessment when TYPE=SHOW_REPORT — but the
# book's authoritative report is car.json from conversion_diff.py. We still
# capture Ora2Pg's per-object log lines for the diff helper to scan.
LOG_ON_ERROR        1
STOP_ON_ERROR       0            # never abort the lab on a single object failure

# -------- Target PG (optional — used by TYPE=LOAD only) ----------------------
PG_DSN              dbi:Pg:dbname=labdb;host=__SET_BY_WRAPPER__.postgres.database.azure.com;port=5432;sslmode=require
PG_USER             labadmin
PG_PWD              __SET_BY_WRAPPER__
