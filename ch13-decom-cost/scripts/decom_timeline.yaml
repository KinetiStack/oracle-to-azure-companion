# decom_timeline.yaml -- machine-readable Day-N schedule.
#
# Consumed by scripts/drr_aggregator.py to confirm the calendar is on track.
# Dates are anchored to a `cutover_date` and computed as offsets so the file
# stays valid across multiple migrations (just change cutover_date).
#
# Stage gates: each stage transitions to the next ONLY after the prior
# stage's required_artifacts all exist and validate. The DRR aggregator
# enforces this -- you cannot post-hoc skip ahead.

schema_version: "1.0.0"
cutover_date:   "2026-06-15"    # the T-0 from the Ch.12 runbook; quote keeps pyyaml from auto-promoting to date

stages:
  - id:            hypercare_close
    offset_days:   3            # T+72h
    label:         "Hypercare ends"
    required_artifacts:
      - "../../ch12-cutover/crr.json"
    transitions_to: source_readonly

  - id:            source_readonly
    offset_days:   7            # T+7d
    label:         "Source flipped to READ ONLY; replication stopped"
    required_artifacts:
      - "source_quiesce_result.json"
      - "../../ch06-offline-migration/scripts/reconcile_final.json"
    transitions_to: source_offline

  - id:            source_offline
    offset_days:   30           # T+30d
    label:         "Instance powered down; rollback window closed"
    required_artifacts:
      - "source_quiesce_result.json"      # re-run at T+30d
      - "rightsize_proposal.json"
    transitions_to: cold_archive

  - id:            cold_archive
    offset_days:   90           # T+90d
    label:         "Final cold backup; host released; FinOps quarterly review"
    required_artifacts:
      - "source_quiesce_result.json"      # final run at T+90d
      - "cold_backup_manifest.json"
    transitions_to: license_return

  - id:            license_return
    offset_days:   180          # T+180d
    label:         "Licenses returned; entitlement records archived (support-cancellation effective date is anchor-dependent on contract anniversary; see §13.3)"
    required_artifacts:
      - "license_return_inventory.json"
    transitions_to: null        # terminal state
