# license_inventory.yaml -- per-host Oracle license inventory.
#
# Reflects the anchored reference architecture: 2-node Oracle 19c RAC
# with 32 cores per node, plus a separate Data Guard standby and a
# GoldenGate hub used during the migration. Customize for your estate.
#
# Schema (validated by license_inventory.py):
#   contract:           support contract identifier
#   renewal_date:       ISO date of next auto-renewal (drives notice deadline)
#   notice_days:        contractual notice period before renewal_date
#   hosts: list of objects with:
#     hostname:         server identifier
#     vcpus:            visible vCPU count (hyperthreaded; ACE policy applies)
#     environment:      'authorized_cloud' | 'on_prem' (drives license math)
#     edition:          'EE' | 'SE2'
#     options:          list of priced options (e.g. 'partitioning', 'rac')
#     goldengate:       true|false
#
# Processor license math (Oracle):
#   on_prem:           ceil(vcpus * core_factor)   (Intel x86 = 0.5; produces ceil(vcpus/2) for EE)
#   authorized_cloud:  ceil(vcpus / 2)              (ACE policy with hyperthreading)
#
# Output (from license_inventory.py): license_return_inventory.json

contract:       "ORA-SUPPORT-44291"
renewal_date:   "2026-11-01"
notice_days:    30

hosts:
  - hostname:    rac-node-1.corp.example.com
    vcpus:       32
    environment: on_prem
    edition:     EE
    options:
      - partitioning
      - advanced_security
      - rac
    goldengate:  false

  - hostname:    rac-node-2.corp.example.com
    vcpus:       32
    environment: on_prem
    edition:     EE
    options:
      - partitioning
      - advanced_security
      - rac
    goldengate:  false

  - hostname:    dg-standby-1.corp.example.com
    vcpus:       32
    environment: on_prem
    edition:     EE
    options:
      - partitioning
      - advanced_security
    goldengate:  false

  - hostname:    gg-hub-1.corp.example.com
    vcpus:       16
    environment: on_prem
    edition:     EE
    options: []
    goldengate:  true
